services:
  db:
    image: postgres:15-alpine
    container_name: monorepo-postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: rootpassword
      POSTGRES_DB: monorepo_db
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data: